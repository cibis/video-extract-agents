---
# Video Extract Platform — GitLab CI/CD Pipeline
# Stages: lint → unit_tests → build_images → integration_tests →
#         aca_test_env_create → deploy_test_services → e2e_tests →
#         aca_test_env_destroy → push_to_acr → deploy_dev →
#         manual_approval → deploy_prod

stages:
  - lint
  - unit_tests
  - build_images
  - integration_tests
  - aca_test_env_create
  - deploy_test_services
  - e2e_tests
  - aca_test_env_destroy
  - push_to_acr
  - deploy_dev
  - manual_approval
  - deploy_prod

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  ACR_REGISTRY: ${ACR_REGISTRY}
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  TF_DIR: infrastructure/terraform/envs/test
  COMPOSE_FILE: infrastructure/docker-compose/docker-compose.yml

# ──────────────────────────────────────────────────────────────────────────────
# Templates
# ──────────────────────────────────────────────────────────────────────────────

.docker-login: &docker-login
  before_script:
    - echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin

.azure-login: &azure-login
  before_script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"

.terraform-setup: &terraform-setup
  image: hashicorp/terraform:1.9
  before_script:
    - cd "$TF_DIR"
    - export TF_VAR_pipeline_id="$CI_PIPELINE_ID"
    - export TF_VAR_image_tag="$IMAGE_TAG"
    - export TF_VAR_acr_login_server="$ACR_REGISTRY"
    - export TF_VAR_acr_username="$ACR_USERNAME"
    - export TF_VAR_acr_password="$ACR_PASSWORD"
    - export TF_VAR_db_admin_password="$DB_ADMIN_PASSWORD"
    - export TF_VAR_anthropic_api_key="$ANTHROPIC_API_KEY"
    - export ARM_CLIENT_ID="$AZURE_CLIENT_ID"
    - export ARM_CLIENT_SECRET="$AZURE_CLIENT_SECRET"
    - export ARM_TENANT_ID="$AZURE_TENANT_ID"
    - export ARM_SUBSCRIPTION_ID="$AZURE_SUBSCRIPTION_ID"
    - terraform init -backend-config="storage_account_name=$TF_STATE_STORAGE_ACCOUNT"

# ──────────────────────────────────────────────────────────────────────────────
# LINT
# ──────────────────────────────────────────────────────────────────────────────

lint:api-gateway:
  stage: lint
  image: node:20-alpine
  script:
    - cd backend/api-gateway
    - npm ci
    - npm run lint
  rules:
    - changes:
        - backend/api-gateway/**

lint:python:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check backend/agent-orchestrator backend/preprocessing-worker backend/notification-worker mcp-servers/
  rules:
    - changes:
        - backend/**/*.py
        - mcp-servers/**/*.py

# ──────────────────────────────────────────────────────────────────────────────
# UNIT TESTS
# ──────────────────────────────────────────────────────────────────────────────

test:api-gateway:
  stage: unit_tests
  image: node:20-alpine
  script:
    - cd backend/api-gateway
    - npm ci
    - npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/api-gateway/coverage/cobertura-coverage.xml

test:agent-orchestrator:
  stage: unit_tests
  image: python:3.11-slim
  script:
    - cd backend/agent-orchestrator
    - pip install poetry
    - poetry install
    - poetry run pytest tests/unit/ --cov=app --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/agent-orchestrator/coverage.xml

test:preprocessing-worker:
  stage: unit_tests
  image: python:3.11-slim
  script:
    - cd backend/preprocessing-worker
    - pip install poetry
    - poetry install
    - poetry run pytest tests/unit/ --cov=app --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+)%/'

test:notification-worker:
  stage: unit_tests
  image: python:3.11-slim
  script:
    - cd backend/notification-worker
    - pip install poetry
    - poetry install
    - poetry run pytest tests/unit/ --cov=app --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+)%/'

test:mcp-server-analysis:
  stage: unit_tests
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends ffmpeg libgl1
  script:
    - cd mcp-servers/mcp-server-analysis
    - pip install poetry
    - poetry install
    - poetry run pytest tests/unit/ --cov=app --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+)%/'

test:mcp-server-processing:
  stage: unit_tests
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends ffmpeg
  script:
    - cd mcp-servers/mcp-server-processing
    - pip install poetry
    - poetry install
    - poetry run pytest tests/unit/ --cov=app --cov-report=xml --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+)%/'

# ──────────────────────────────────────────────────────────────────────────────
# BUILD IMAGES
# ──────────────────────────────────────────────────────────────────────────────

.build-image: &build-image
  stage: build_images
  image: docker:26
  services:
    - docker:26-dind
  <<: *docker-login

build:api-gateway:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/api-gateway:$IMAGE_TAG" backend/api-gateway/
    - docker push "$ACR_REGISTRY/api-gateway:$IMAGE_TAG"

build:agent-orchestrator:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/agent-orchestrator:$IMAGE_TAG" backend/agent-orchestrator/
    - docker push "$ACR_REGISTRY/agent-orchestrator:$IMAGE_TAG"

build:preprocessing-worker:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/preprocessing-worker:$IMAGE_TAG" backend/preprocessing-worker/
    - docker push "$ACR_REGISTRY/preprocessing-worker:$IMAGE_TAG"

build:notification-worker:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/notification-worker:$IMAGE_TAG" backend/notification-worker/
    - docker push "$ACR_REGISTRY/notification-worker:$IMAGE_TAG"

build:mcp-server-analysis:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/mcp-server-analysis:$IMAGE_TAG" mcp-servers/mcp-server-analysis/
    - docker push "$ACR_REGISTRY/mcp-server-analysis:$IMAGE_TAG"

build:mcp-server-processing:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/mcp-server-processing:$IMAGE_TAG" mcp-servers/mcp-server-processing/
    - docker push "$ACR_REGISTRY/mcp-server-processing:$IMAGE_TAG"

build:angular-shell:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/angular-shell:$IMAGE_TAG" frontend/angular-shell/
    - docker push "$ACR_REGISTRY/angular-shell:$IMAGE_TAG"

build:librechat:
  <<: *build-image
  script:
    - docker build -t "$ACR_REGISTRY/librechat:$IMAGE_TAG" frontend/librechat/
    - docker push "$ACR_REGISTRY/librechat:$IMAGE_TAG"

# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION TESTS (Docker Compose)
# ──────────────────────────────────────────────────────────────────────────────

integration_tests:
  stage: integration_tests
  image: docker:26
  services:
    - docker:26-dind
  variables:
    ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
  before_script:
    - apk add --no-cache python3 py3-pip curl bash
    - pip3 install pytest httpx asyncpg
    - docker compose -f $COMPOSE_FILE up -d --build
    - |
      for svc in api-gateway agent-orchestrator mcp-server-analysis mcp-server-processing; do
        echo "Waiting for $svc..."
        for i in $(seq 1 30); do
          curl -sf "http://localhost:$(echo $svc | grep -oP '\d+')/health" && break || sleep 5
        done
      done
    - |
      DATABASE_URL="postgresql://postgres:postgres@localhost:5433/videoextract" \
        python3 scripts/init_db.py
  script:
    - pytest tests/integration/ -v --tb=short
  after_script:
    - docker compose -f $COMPOSE_FILE down -v

# ──────────────────────────────────────────────────────────────────────────────
# ACA TEST ENVIRONMENT
# ──────────────────────────────────────────────────────────────────────────────

aca_test_env_create:
  stage: aca_test_env_create
  <<: *terraform-setup
  script:
    - terraform apply -auto-approve
    - terraform output -json > /tmp/tf-outputs.json
  artifacts:
    paths:
      - /tmp/tf-outputs.json
    expire_in: 2h

deploy_test_services:
  stage: deploy_test_services
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      RG="video-extract-test-${CI_PIPELINE_ID}"
      for svc in "${SERVICES[@]}"; do
        az containerapp update \
          --name "$svc" \
          --resource-group "$RG" \
          --image "$ACR_REGISTRY/$svc:$IMAGE_TAG" || true
      done

e2e_tests:
  stage: e2e_tests
  image: python:3.11-slim
  variables:
    API_GATEWAY_URL: "https://api-gateway.$(cat /tmp/tf-outputs.json | python3 -c \"import sys,json; print(json.load(sys.stdin)['api_gateway_fqdn']['value'])\")"
  script:
    - pip install pytest httpx asyncpg
    - pytest tests/e2e/ -v --tb=short || true  # Non-blocking; failures reported but don't fail the destroy step

aca_test_env_destroy:
  stage: aca_test_env_destroy
  <<: *terraform-setup
  script:
    - terraform destroy -auto-approve
  when: always  # Always runs — cleans up even if previous stages fail

# ──────────────────────────────────────────────────────────────────────────────
# PUSH PRODUCTION IMAGES (tag with git ref + latest)
# ──────────────────────────────────────────────────────────────────────────────

push_to_acr:
  stage: push_to_acr
  image: docker:26
  services:
    - docker:26-dind
  <<: *docker-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      for svc in "${SERVICES[@]}"; do
        docker pull "$ACR_REGISTRY/$svc:$IMAGE_TAG"
        docker tag  "$ACR_REGISTRY/$svc:$IMAGE_TAG" "$ACR_REGISTRY/$svc:latest"
        docker push "$ACR_REGISTRY/$svc:latest"
      done
  only:
    - main

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY DEV
# ──────────────────────────────────────────────────────────────────────────────

deploy_dev:
  stage: deploy_dev
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      for svc in "${SERVICES[@]}"; do
        az containerapp update \
          --name "$svc" \
          --resource-group "video-extract-dev" \
          --image "$ACR_REGISTRY/$svc:$IMAGE_TAG"
      done
  environment:
    name: dev
  only:
    - main

# ──────────────────────────────────────────────────────────────────────────────
# MANUAL APPROVAL GATE
# ──────────────────────────────────────────────────────────────────────────────

manual_approval:
  stage: manual_approval
  image: alpine:latest
  script:
    - echo "Manual approval granted — proceeding to production deployment"
  when: manual
  allow_failure: false
  only:
    - main

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY PROD
# ──────────────────────────────────────────────────────────────────────────────

deploy_prod:
  stage: deploy_prod
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      for svc in "${SERVICES[@]}"; do
        az containerapp update \
          --name "$svc" \
          --resource-group "video-extract-prod" \
          --image "$ACR_REGISTRY/$svc:$IMAGE_TAG"
      done
  environment:
    name: prod
  needs:
    - manual_approval
  only:
    - main
