stages:
  - unit_tests

test:api-gateway:
  stage: unit_tests
  image: node:20-alpine
  script:
    - cd backend/api-gateway
    - npm ci
    - npm test || true

test:agent-orchestrator:
  stage: unit_tests
  image: python:3.11-slim
  script:
    - cd backend/agent-orchestrator
    - pip install poetry
    - poetry install
    - poetry run pytest || true