---
# Video Extract Platform — GitLab CI/CD Pipeline
# Stages: lint → build_images → aca_test_env_create → deploy_test_services →
#         e2e_tests → collect_e2e_logs → aca_test_env_destroy → push_to_acr →
#         deploy_dev → manual_approval → deploy_prod
#

stages:
  - lint
  - build_images
  - build_analysis
  - aca_test_env_create
  - deploy_test_services
  - e2e_tests
  - collect_e2e_logs
  - aca_test_env_destroy
  - push_to_acr
  - deploy_dev
  - manual_approval
  - deploy_prod

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  TF_DIR: infrastructure/terraform/envs/test
  COMPOSE_FILE: infrastructure/docker-compose/docker-compose.yml

# ──────────────────────────────────────────────────────────────────────────────
# Templates
# ──────────────────────────────────────────────────────────────────────────────

.docker-login: &docker-login
  before_script:
    - docker system prune -af || true
    - env | grep ACR || true
    - echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin

.azure-login: &azure-login
  before_script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"

.terraform-setup: &terraform-setup
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  before_script:
    - cd "$TF_DIR"
    - export TF_VAR_pipeline_id="$CI_PIPELINE_ID"
    - export TF_VAR_image_tag="$IMAGE_TAG"
    - export TF_VAR_acr_login_server="$ACR_REGISTRY"
    - export TF_VAR_acr_username="$ACR_USERNAME"
    - export TF_VAR_acr_password="$ACR_PASSWORD"
    - export TF_VAR_db_admin_password="$DB_ADMIN_PASSWORD"
    - export TF_VAR_anthropic_api_key="$ANTHROPIC_API_KEY"
    - export ARM_CLIENT_ID="$AZURE_CLIENT_ID"
    - export ARM_CLIENT_SECRET="$AZURE_CLIENT_SECRET"
    - export ARM_TENANT_ID="$AZURE_TENANT_ID"
    - export ARM_SUBSCRIPTION_ID="$AZURE_SUBSCRIPTION_ID"
    - export TF_VAR_subscription_id="$AZURE_SUBSCRIPTION_ID"
    - terraform init -backend-config="access_key=$TF_STATE_ACCESS_KEY"

# ──────────────────────────────────────────────────────────────────────────────
# LINT
# ──────────────────────────────────────────────────────────────────────────────

lint:api-gateway:
  stage: lint
  image: node:20-alpine
  script:
    - cd backend/api-gateway
    - npm ci
    - npm run lint
  rules:
    - changes:
        - backend/api-gateway/**

lint:python:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check backend/agent-orchestrator backend/preprocessing-worker backend/notification-worker mcp-servers/
  rules:
    - changes:
        - backend/**/*.py
        - mcp-servers/**/*.py

# ──────────────────────────────────────────────────────────────────────────────
# BUILD IMAGES
# ──────────────────────────────────────────────────────────────────────────────

.build-image: &build-image
  stage: build_images
  image: docker:26
  services:
    - docker:26-dind
  <<: *docker-login

build:api-gateway:
  <<: *build-image
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$ACR_REGISTRY/api-gateway:buildcache" \
        -t "$ACR_REGISTRY/api-gateway:$IMAGE_TAG" \
        backend/api-gateway/
    - docker push "$ACR_REGISTRY/api-gateway:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/api-gateway:$IMAGE_TAG" "$ACR_REGISTRY/api-gateway:buildcache"
    - docker push "$ACR_REGISTRY/api-gateway:buildcache" || true

build:agent-orchestrator:
  <<: *build-image
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$ACR_REGISTRY/agent-orchestrator:buildcache" \
        -t "$ACR_REGISTRY/agent-orchestrator:$IMAGE_TAG" \
        backend/agent-orchestrator/
    - docker push "$ACR_REGISTRY/agent-orchestrator:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/agent-orchestrator:$IMAGE_TAG" "$ACR_REGISTRY/agent-orchestrator:buildcache"
    - docker push "$ACR_REGISTRY/agent-orchestrator:buildcache" || true

build:preprocessing-worker:
  <<: *build-image
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$ACR_REGISTRY/preprocessing-worker:buildcache" \
        -t "$ACR_REGISTRY/preprocessing-worker:$IMAGE_TAG" \
        backend/preprocessing-worker/
    - docker push "$ACR_REGISTRY/preprocessing-worker:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/preprocessing-worker:$IMAGE_TAG" "$ACR_REGISTRY/preprocessing-worker:buildcache"
    - docker push "$ACR_REGISTRY/preprocessing-worker:buildcache" || true

build:notification-worker:
  <<: *build-image
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$ACR_REGISTRY/notification-worker:buildcache" \
        -t "$ACR_REGISTRY/notification-worker:$IMAGE_TAG" \
        backend/notification-worker/
    - docker push "$ACR_REGISTRY/notification-worker:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/notification-worker:$IMAGE_TAG" "$ACR_REGISTRY/notification-worker:buildcache"
    - docker push "$ACR_REGISTRY/notification-worker:buildcache" || true

build:mcp-server-analysis:
  stage: build_analysis
  image: docker:26
  services:
    - docker:26-dind
  <<: *docker-login
  script:
    - docker system prune -f || true
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg PRELOAD_MODELS=false \
        --cache-from "$ACR_REGISTRY/mcp-server-analysis:buildcache" \
        -t "$ACR_REGISTRY/mcp-server-analysis:$IMAGE_TAG" \
        mcp-servers/mcp-server-analysis/
    - docker push "$ACR_REGISTRY/mcp-server-analysis:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/mcp-server-analysis:$IMAGE_TAG" "$ACR_REGISTRY/mcp-server-analysis:buildcache"
    - docker push "$ACR_REGISTRY/mcp-server-analysis:buildcache" || true

build:mcp-server-processing:
  <<: *build-image
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$ACR_REGISTRY/mcp-server-processing:buildcache" \
        -t "$ACR_REGISTRY/mcp-server-processing:$IMAGE_TAG" \
        mcp-servers/mcp-server-processing/
    - docker push "$ACR_REGISTRY/mcp-server-processing:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/mcp-server-processing:$IMAGE_TAG" "$ACR_REGISTRY/mcp-server-processing:buildcache"
    - docker push "$ACR_REGISTRY/mcp-server-processing:buildcache" || true

build:angular-shell:
  <<: *build-image
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$ACR_REGISTRY/angular-shell:buildcache" \
        -t "$ACR_REGISTRY/angular-shell:$IMAGE_TAG" \
        frontend/angular-shell/
    - docker push "$ACR_REGISTRY/angular-shell:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/angular-shell:$IMAGE_TAG" "$ACR_REGISTRY/angular-shell:buildcache"
    - docker push "$ACR_REGISTRY/angular-shell:buildcache" || true

build:librechat:
  <<: *build-image
  script:
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$ACR_REGISTRY/librechat:buildcache" \
        -t "$ACR_REGISTRY/librechat:$IMAGE_TAG" \
        frontend/librechat/
    - docker push "$ACR_REGISTRY/librechat:$IMAGE_TAG"
    - docker tag "$ACR_REGISTRY/librechat:$IMAGE_TAG" "$ACR_REGISTRY/librechat:buildcache"
    - docker push "$ACR_REGISTRY/librechat:buildcache" || true

# ──────────────────────────────────────────────────────────────────────────────
# ACA TEST ENVIRONMENT
# ──────────────────────────────────────────────────────────────────────────────

aca_test_env_create:
  stage: aca_test_env_create
  <<: *terraform-setup
  script:
    - terraform apply -auto-approve
    - terraform output -json > tf-outputs.json
  artifacts:
    paths:
      - infrastructure/terraform/envs/test/tf-outputs.json
    expire_in: 2h

deploy_test_services:
  stage: deploy_test_services
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      RG="video-extract-test-${CI_PIPELINE_ID}"
      for svc in "${SERVICES[@]}"; do
        az containerapp update \
          --name "$svc" \
          --resource-group "$RG" \
          --image "$ACR_REGISTRY/$svc:$IMAGE_TAG" || true
      done

e2e_tests:
  stage: e2e_tests
  image: python:3.11-slim
  script:
    - apt-get update -qq && apt-get install -y --no-install-recommends ffmpeg curl
    - pip install pytest httpx asyncpg
    - OUTPUTS="infrastructure/terraform/envs/test/tf-outputs.json"
    - export API_GATEWAY_URL="https://$(python3 -c 'import json; print(json.load(open("infrastructure/terraform/envs/test/tf-outputs.json"))["api_gateway_fqdn"]["value"])')"
    - export AGENT_ORCHESTRATOR_URL="https://$(python3 -c 'import json; print(json.load(open("infrastructure/terraform/envs/test/tf-outputs.json"))["agent_orchestrator_fqdn"]["value"])')"
    - export MCP_ANALYSIS_URL="https://$(python3 -c 'import json; print(json.load(open("infrastructure/terraform/envs/test/tf-outputs.json"))["mcp_analysis_fqdn"]["value"])')"
    - export MCP_PROCESSING_URL="https://$(python3 -c 'import json; print(json.load(open("infrastructure/terraform/envs/test/tf-outputs.json"))["mcp_processing_fqdn"]["value"])')"
    - |
      echo "Waiting for API Gateway to be healthy (ACA cold start)..."
      for i in $(seq 1 3); do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_GATEWAY_URL/health" || true)
        if [ "$STATUS" = "200" ]; then
          echo "API Gateway healthy after $i attempts."
          break
        fi
        echo "  attempt $i: status=$STATUS — retrying in 5s..."
        sleep 5
      done
    - pytest tests/e2e/ -v --tb=short

collect_e2e_logs:
  stage: collect_e2e_logs
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure-login
  when: always
  script:
    - RG="video-extract-test-${CI_PIPELINE_ID}"
    - SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat postgresql)
    - mkdir -p ci-logs
    - |
      # --- Container stdout/stderr logs (last 2000 lines each) ---
      for svc in "${SERVICES[@]}"; do
        echo "=== $svc ===" | tee ci-logs/${svc}.log
        az containerapp logs show \
          --name "$svc" \
          --resource-group "$RG" \
          --tail 2000 \
          --output table 2>&1 | tee -a ci-logs/${svc}.log || \
          echo "[no logs available for $svc]" >> ci-logs/${svc}.log
      done
    - |
      # --- Container app status and replica diagnostics ---
      echo "=== Container App Status ===" > ci-logs/aca-status.log
      for svc in "${SERVICES[@]}"; do
        echo "--- $svc ---" >> ci-logs/aca-status.log
        az containerapp show \
          --name "$svc" \
          --resource-group "$RG" \
          --query "{name:name, provisioningState:properties.provisioningState, latestRevision:properties.latestRevisionName, runningStatus:properties.runningStatus}" \
          --output json 2>&1 >> ci-logs/aca-status.log || true
        az containerapp replica list \
          --name "$svc" \
          --resource-group "$RG" \
          --output table 2>&1 >> ci-logs/aca-status.log || true
      done
    - |
      # --- Resource group overview ---
      echo "=== Resource Group Resources ===" > ci-logs/rg-resources.log
      az resource list --resource-group "$RG" --output table 2>&1 >> ci-logs/rg-resources.log
    - |
      # --- Service Bus queue depths ---
      echo "=== Service Bus Queue Depths ===" > ci-logs/servicebus.log
      SB_NS=$(az servicebus namespace list --resource-group "$RG" --query "[0].name" --output tsv 2>/dev/null || true)
      if [ -n "$SB_NS" ]; then
        for q in video-uploaded video-indexed job-queued job-completed job-failed; do
          az servicebus queue show \
            --namespace-name "$SB_NS" \
            --resource-group "$RG" \
            --name "$q" \
            --query "{queue:name, active:countDetails.activeMessageCount, dead:countDetails.deadLetterMessageCount}" \
            --output json 2>&1 >> ci-logs/servicebus.log || true
        done
      fi
    - echo "Log collection complete. Files:" && ls -lh ci-logs/
  artifacts:
    name: "e2e-logs-${CI_PIPELINE_ID}"
    paths:
      - ci-logs/
    expire_in: 7d
    when: always

aca_test_env_destroy:
  stage: aca_test_env_destroy
  <<: *terraform-setup
  script:
    - terraform destroy -auto-approve
  when: always  # Always runs — cleans up even if previous stages fail

# ──────────────────────────────────────────────────────────────────────────────
# PUSH PRODUCTION IMAGES (tag with git ref + latest)
# ──────────────────────────────────────────────────────────────────────────────

push_to_acr:
  stage: push_to_acr
  image: docker:26
  services:
    - docker:26-dind
  <<: *docker-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      for svc in "${SERVICES[@]}"; do
        docker pull "$ACR_REGISTRY/$svc:$IMAGE_TAG"
        docker tag  "$ACR_REGISTRY/$svc:$IMAGE_TAG" "$ACR_REGISTRY/$svc:latest"
        docker push "$ACR_REGISTRY/$svc:latest"
      done
  only:
    - main

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY DEV
# ──────────────────────────────────────────────────────────────────────────────

deploy_dev:
  stage: deploy_dev
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      for svc in "${SERVICES[@]}"; do
        az containerapp update \
          --name "$svc" \
          --resource-group "video-extract-dev" \
          --image "$ACR_REGISTRY/$svc:$IMAGE_TAG"
      done
  environment:
    name: dev
  only:
    - main

# ──────────────────────────────────────────────────────────────────────────────
# MANUAL APPROVAL GATE
# ──────────────────────────────────────────────────────────────────────────────

manual_approval:
  stage: manual_approval
  image: alpine:latest
  script:
    - echo "Manual approval granted — proceeding to production deployment"
  when: manual
  allow_failure: false
  only:
    - main

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY PROD
# ──────────────────────────────────────────────────────────────────────────────

deploy_prod:
  stage: deploy_prod
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure-login
  script:
    - |
      SERVICES=(api-gateway agent-orchestrator preprocessing-worker notification-worker
                mcp-server-analysis mcp-server-processing angular-shell librechat)
      for svc in "${SERVICES[@]}"; do
        az containerapp update \
          --name "$svc" \
          --resource-group "video-extract-prod" \
          --image "$ACR_REGISTRY/$svc:$IMAGE_TAG"
      done
  environment:
    name: prod
  needs:
    - manual_approval
  only:
    - main
