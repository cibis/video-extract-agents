server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS so upstream hostnames are re-resolved dynamically
    # (prevents 502 after container restarts). Required when proxy_pass uses variables.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"angular-shell"}';
        add_header Content-Type application/json;
    }

    # LibreChat's own backend API — called by LibreChat JS inside the iframe
    # (auth, convos, messages etc.). Angular shell calls api-gateway directly
    # on port 8000, not through this proxy.
    # proxy_pass $var passes the original /api/... URI unchanged to librechat.
    location /api/ {
        set $librechat_upstream http://librechat:3080;
        proxy_pass $librechat_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # LibreChat static assets — LibreChat uses absolute paths (/assets/...) in its
    # HTML so these arrive here rather than at /chat/. ^~ blocks the regex cache
    # rule below from taking priority. proxy_pass $var passes /assets/... unchanged.
    location ^~ /assets/ {
        set $librechat_upstream http://librechat:3080;
        proxy_pass $librechat_upstream;
        proxy_set_header Host $host;
    }

    # LibreChat service workers — absolute paths from LibreChat HTML
    location = /registerSW.js {
        set $librechat_upstream http://librechat:3080;
        proxy_pass $librechat_upstream;
        proxy_set_header Host $host;
    }

    location = /sw.js {
        set $librechat_upstream http://librechat:3080;
        proxy_pass $librechat_upstream;
        proxy_set_header Host $host;
    }

    # Proxy LibreChat UI — strip /chat/ prefix so LibreChat sees its routes from /.
    # rewrite strips the prefix before proxy_pass so the variable form can be used
    # (enabling DNS re-resolution via the resolver above).
    # Strips X-Frame-Options so the same-origin iframe embedding works.
    location /chat/ {
        set $librechat_upstream http://librechat:3080;
        rewrite ^/chat/(.*) /$1 break;
        proxy_pass $librechat_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Angular SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Entry points have no content hash — must not be cached
    location ~* ^/(index\.html|main\.js|polyfills\.js|styles\.css)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Content-hashed chunks are immutable — long-term cache is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
