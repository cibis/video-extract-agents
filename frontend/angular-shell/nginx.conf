server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"angular-shell"}';
        add_header Content-Type application/json;
    }

    # Angular app's API calls — strip /api prefix, forward /v1/... to api-gateway.
    # Direct proxy_pass (not the set-$var form) so nginx resolves the hostname via the
    # OS resolver, which honours /etc/resolv.conf search domains. In ACA the search
    # domain k8se-apps.svc.cluster.local resolves the short name "api-gateway" to the
    # Kubernetes ClusterIP; in Docker Compose Docker's embedded DNS handles it directly.
    # proxy_buffering off is required for the SSE job-stream endpoint (/v1/jobs/.../stream).
    location /api/v1/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass ${API_GATEWAY_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # LibreChat's own backend API — called by LibreChat JS inside the iframe
    # (auth, convos, messages etc.).
    location /api/ {
        proxy_pass ${LIBRECHAT_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # LibreChat static assets — LibreChat uses absolute paths (/assets/...) in its
    # HTML so these arrive here rather than at /chat/. ^~ blocks the regex cache
    # rule below from taking priority.
    location ^~ /assets/ {
        proxy_pass ${LIBRECHAT_URL};
        proxy_set_header Host $host;
    }

    # LibreChat service workers — absolute paths from LibreChat HTML
    location = /registerSW.js {
        proxy_pass ${LIBRECHAT_URL};
        proxy_set_header Host $host;
    }

    location = /sw.js {
        proxy_pass ${LIBRECHAT_URL};
        proxy_set_header Host $host;
    }

    # Proxy LibreChat UI — strip /chat/ prefix so LibreChat sees its routes from /.
    # Strips X-Frame-Options so the same-origin iframe embedding works.
    location /chat/ {
        rewrite ^/chat/(.*) /$1 break;
        proxy_pass ${LIBRECHAT_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Angular SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Entry points have no content hash — must not be cached
    location ~* ^/(index\.html|main\.js|polyfills\.js|styles\.css)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Content-hashed chunks are immutable — long-term cache is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
